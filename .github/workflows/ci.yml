# SPDX-License-Identifier: CC0-1.0

name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check-formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: cargo fmt -v --check

  check-license-identifiers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: python3 repo-tools/verify_spdx.py

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: sudo apt-get install -y gcc-mingw-w64-x86-64
      - name: Add targets
        run: rustup target add x86_64-unknown-linux-gnu && rustup target add
          x86_64-pc-windows-gnu
      - name: Build Linux
        run: cargo build --verbose --target=x86_64-unknown-linux-gnu
      - name: Build Windows
        run: cargo build --verbose --target=x86_64-pc-windows-gnu
      - name: Run tests
        run: cargo test --verbose --features=ci
      - name: Clippy
        run: cargo clippy --no-deps --  --deny warnings